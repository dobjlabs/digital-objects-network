name: Deploy docs to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - uses: actions/configure-pages@v5
        id: pages

      # base_path is "/<repo>" on <owner>.github.io and "" on a custom
      # domain, so the same workflow works for both.
      - run: pnpm build
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      # GitHub Pages 301-redirects clean URLs (/foo -> /foo/) for directory-style
      # output, and vocs emits clean (no-trailing-slash) links, so every cross-page
      # nav hits that redirect. Write a flat <route>.html beside each
      # <route>/index.html so /foo serves directly with no redirect.
      - run: |
          find dist/public -mindepth 2 -name index.html ! -path '*.d/*' | while read -r f; do
            cp "$f" "${f%/index.html}.html"
          done

      # Vocs v2 full-static build emits the deployable site under dist/public
      # (dist/ also holds server/preview bundles that static hosting ignores).
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
