[workspace]
members = [
    "app-gui/src-tauri",
    "synchronizer",
]
resolver = "2"

[workspace.dependencies]
pod2 = { git = "https://github.com/0xPARC/pod2", rev = "cdf227e3530247e07e375daed007cae7d443b4ae", default-features = false, features = ["backend_plonky2", "disk_cache", "zk"] }
plonky2 = { git = "https://github.com/0xPARC/plonky2.git", rev = "109d517d09c210ae4c2cee381d3e3fbc04aa3812" }
serde = { version = "1.0.150", features = ["derive"] }
serde_json = "1.0.143"
