[workspace]
members = ["app-gui/src-tauri", "common", "pod2utils", "relayer", "synchronizer", "txlib",  "vdfpod", "lt_eq_u256_pod", "craftlib"]
resolver = "2"

[workspace.dependencies]
pod2 = { git = "https://github.com/0xPARC/pod2", rev = "9993799c08e6e95b11eb016763fcc13f5030293e", default-features = false, features = [
    "backend_plonky2",
    "disk_cache",
    "zk",
] }
plonky2 = { git = "https://github.com/0xPARC/plonky2.git", rev = "109d517d09c210ae4c2cee381d3e3fbc04aa3812" }
serde = { version = "1.0.150", features = ["derive"] }
serde_json = "1.0.143"

# common
anyhow = "1.0.56"
itertools = "0.14.0"
dotenvy = "0.15.7"
hex = "0.4.3"

# logging
env_logger = { version = "0.11" }
log = { version = "0.4.14", features = ["kv_unstable"] }
tracing = "0.1.19"
tracing-subscriber = { version = "0.3", features = [
    "registry",
    "env-filter",
    "fmt",
    "time",
] }
tracing-log = "0.1.1"
time = { version = "0.3.44", features = ["formatting", "local-offset"] }
rand = { version = "0.9.2", features = ["std_rng"] }
