[package]
name = "craft-methods"
version = "0.1.0"
edition = "2021"

# Builds the risc0 zkVM guest at `../craft-guest` into a RISC-V ELF and
# exposes two constants for the host (driver):
#
#     CRAFT_GUEST_ELF: &[u8]      // the compiled guest binary
#     CRAFT_GUEST_ID:  [u32; 8]   // image_id (pinned in the synchronizer / relayer)
#
# Generated by `risc0-build::embed_methods` at compile time. The guest crate
# is its own one-crate workspace; pointing `methods = [...]` at it tells
# `risc0-build` to invoke `cargo build` against that directory with the
# RISC-V target.

[build-dependencies]
risc0-build = { version = "^3.0.5" }

[package.metadata.risc0]
methods = ["../craft-guest"]

[dev-dependencies]
risc0-zkvm = { version = "^3.0.5" }
craft-actions = { path = "../craft-actions" }
txlib-core = { path = "../txlib-core" }
borsh = { version = "1.5", features = ["derive"] }
anyhow = { workspace = true }
tracing-subscriber = { workspace = true }
