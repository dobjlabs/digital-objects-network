procs:
  bootstrap_dobjds:
    shell: |
      cargo build -p dobjd --release
      exec bash agents/scripts/bootstrap_dobjds.sh

  # Waits for the 6 bootstrap dobjds to come up before starting the A2A
  # agents — mprocs doesn't have native deps, so we poll /healthz inline.
  # Each agent's executor will fail fast if its dobjd isn't reachable, so
  # this matters.
  run_all:
    shell: |
      echo "run_all: waiting for bootstrap dobjds (7727, 7737, 7747, 7757, 7767, 7777)…"
      for port in 7727 7737 7747 7757 7767 7777; do
        until curl -fsS --max-time 1 "http://127.0.0.1:$port/healthz" >/dev/null 2>&1; do
          sleep 2
        done
        echo "  :$port ready"
      done
      echo "all six dobjds healthy — starting A2A agents"
      exec bash agents/scripts/run_all.sh

  # The user's own dev-remote dobjd at :7717 (the standard default — same
  # port `just dev` and `just dev-remote` use). Distinct from the 6
  # bootstrap dobjds owned by the demo (which now start at :7727).
  dobjd:
    shell: just dobjd

  web:
    shell: just web

  desktop:
    shell: just desktop-shell
